apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: "ebms-send-in"
  namespace: "team-emottak"
  labels:
    "team": "team-emottak"
spec:
  azure:
    application:
      enabled: true
  webproxy: true
  image: {{image}}
  liveness:
    path: "/internal/health/liveness"
    port: 8080
    initialDelay: 30
    timeout: 10
    failureThreshold: 10
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
      destinations:
        - id: "grafana-lgtm"
        - id: "elastic-apm"
    logging:
      destinations:
        - id: elastic
        - id: loki
  prometheus:
    enabled: true
    path: /prometheus
  readiness:
    path: "/internal/health/readiness"
    port: 8080
    initialDelay: 30
    timeout: 10
    failureThreshold: 10
  replicas:
    scalingStrategy:
      cpu:
        thresholdPercentage: 50
    min: 1
    max: 4
  resources:
    limits:
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "256Mi"
  ingresses:
    - "https://ebms-send-in.intern.dev.nav.no"
  vault:
    enabled: true
    paths:
        - kvPath: /serviceuser/data/dev/srvtokt
          mountPath: /secret/srvtokt
        - kvPath: /serviceuser/data/dev/srvemottakmq
          mountPath: /secret/srvemottakmq
  kafka:
    pool: nav-dev
  accessPolicy:
    inbound:
      rules:
        - application: ebms-provider
        - application: ebms-async
        - application: azure-token-generator
          namespace: aura
          cluster: dev-gcp
  envFrom:
    - configmap: ebms-send-in
  env:
    - name: FRIKORT_URL
      value: https://wasapp-q1.adeo.no/nav-frikort/tjenestereksterne
    - name: EMOTTAK_LOGGING_LEVEL
      value: DEBUG
    - name: SRVTOKT_SECRET_PATH
      value: /secret/srvtokt
    - name: SERVICEUSERMQ_SECRET_PATH
      value: /secret/srvemottakmq
    - name: NAV_HER_ID
      value: "79768"
    - name: MQ_HOST
      value: "mqls04.preprod.local"
    - name: MQ_PORT
      value: "1413"
    - name: MQ_CHANNEL
      value: "Q1_EMOTTAK_ASYNCH"
    - name: MQ_QMGR
      value: "MQLS04"
    - name: TREKKOPPL_MQ_QUEUE
      value: "QA.Q1_231.OB04_INNRAPP_TREKK"
    - name: SYFO_MQ_QUEUE
      value: "QA.Q1_SYFOSMMOTTAK.INPUT"
    - name: PALE_MQ_QUEUE
      value: "QA.Q1_PALE.INPUT"
    - name: OPPGJOR_MQ_QUEUE
      value: "QA.Q414.FS06_KONTROLL_OPPGJOR"
    - name: ERESEPT_M18_MQ_QUEUE
      value: "QA.Q2216.ERESEPT_M18_MDB"
    - name: ERESEPT_APPREC_MQ_QUEUE
      value: "QA.Q2216.ERESEPT_APPREC_MDB"
    - name: EIA_MQ_QUEUE
      value: "QA.Q414.FS06_EIA_MELDINGER"
    - name: DIALOG_MQ_QUEUE
      value: "QA.Q1_DIALOGFORDELER.DIALOGMELDINGER"
