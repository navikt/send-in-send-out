micrometer-registry-prometheus = { module = "io.micrometer:micrometer-registry-prometheus", version.ref = "micrometer-registry-prometheus" }
saaj-impl = { module = "com.sun.xml.messaging.saaj:saaj-impl", version.ref = "saaj-impl" }
stacktrace-decoroutinator-jvm = { module = "dev.reformator.stacktracedecoroutinator:stacktrace-decoroutinator-jvm", version.ref = "stacktrace-decoroutinator-jvm" }
token-validation-ktor-v3 = { module = "no.nav.security:token-validation-ktor-v3", version.ref = "token-validation-ktor" }

[bundles]
cxf = ["cxf-rt-frontend-jaxws", "cxf-rt-transports-http", "cxf-rt-ws-security", "cxf-rt-features-logging", "jakarta-xml-ws-api"]
logging = ["logback-classic", "logback-logstash"]
prometheus = ["ktor-server-metrics-micrometer", "micrometer-registry-prometheus"]
